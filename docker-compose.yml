services:
    bsi-agent-api:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
        container_name: bsi-agent-api
        ports:
            - "3333:3333"
        environment:
            NODE_ENV: production
            PORT: 3333
            ENABLE_AUTH: "false" # set to "true" + add JWT_SECRET to enable auth
            # JWT_SECRET: change-me
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        networks:
            - shared-net
networks:
    shared-net:
        external: true
